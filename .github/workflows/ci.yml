name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate backend source
        run: npm run ci:backend

      - name: Build frontend
        run: npm run ci:frontend

