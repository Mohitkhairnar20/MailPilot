name: Deploy to Render

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Trigger API deploy
        env:
          RENDER_API_DEPLOY_HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_API_DEPLOY_HOOK" ]; then
            echo "Missing secret: RENDER_API_DEPLOY_HOOK" >&2
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$RENDER_API_DEPLOY_HOOK"

      - name: Trigger worker deploy
        env:
          RENDER_WORKER_DEPLOY_HOOK: ${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_WORKER_DEPLOY_HOOK" ]; then
            echo "Missing secret: RENDER_WORKER_DEPLOY_HOOK" >&2
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$RENDER_WORKER_DEPLOY_HOOK"

      - name: Trigger frontend deploy
        env:
          RENDER_WEB_DEPLOY_HOOK: ${{ secrets.RENDER_WEB_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_WEB_DEPLOY_HOOK" ]; then
            echo "Missing secret: RENDER_WEB_DEPLOY_HOOK" >&2
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$RENDER_WEB_DEPLOY_HOOK"
